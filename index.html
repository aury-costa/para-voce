<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethereal Love</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --accent: #ff85a2;
            --text: #4a4a4a;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            /* IMAGEM DE FUNDO DO STITCH */
            background: url('fundo.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* EFEITO DE CORAÇÕES NEON FLUTUANTES */
        .heart-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 133, 162, 0.6);
            text-shadow: 0 0 15px rgba(255, 133, 162, 0.8);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 1.9; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(8px);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.2);
            width: 90%;
            max-width: 400px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: var(--accent); margin-bottom: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }

        .btn-love {
            background: white;
            border: 2px solid #ffdae3;
            padding: 12px 20px;
            margin: 8px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--text);
            font-weight: 500;
        }

        .btn-love:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 133, 162, 0.3);
        }

        #admin-trigger {
            position: fixed; bottom: 15px; right: 15px;
            font-size: 18px; color: var(--accent);
            cursor: pointer; opacity: 0.2; z-index: 9999;
        }

        #admin-trigger:hover { opacity: 1; }

        #admin-panel, #user-view { display: none; }

        .gift-box { font-size: 50px; margin: 10px; display: inline-block; cursor: pointer; transition: 0.5s; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }
        .gift-box:hover { transform: rotate(15deg) scale(1.2); }

        .rose-anim { font-size: 70px; animation: heartbeat 2s infinite ease-in-out; }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .msg-reveal {
            animation: fadeIn 1s ease-in;
            font-size: 1.2rem;
            color: #ff5c8a;
            font-weight: bold;
            margin-top: 15px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #logs { background: #fff; height: 150px; overflow-y: auto; border-radius: 10px; padding: 10px; font-size: 11px; text-align: left; }
    </style>
</head>
<body>

    <div class="heart-bg" id="heartContainer"></div>
    <div id="admin-trigger" onclick="openAdmin()">🤍</div>
    <audio id="meu-player"></audio>

    <div class="container">
        <div id="login-screen">
            <h1>Para Você</h1>
            <p style="letter-spacing: 2px;">Minha Princesa.</p>
            <button class="btn-love" onclick="startApp()">Entrar ♥️</button>
        </div>

        <div id="user-view">
            <h1>♥️</h1>
            <div>
                <button class="btn-love" onclick="showRose()">🌹 A Rosa</button>
                <button class="btn-love" onclick="showMusic()">🎵 Sintonia</button>
                <button class="btn-love" onclick="showGifts()">🎁 Destino</button>
            </div>
            <div id="content" style="margin-top: 20px; min-height: 150px;"></div>
        </div>

        <div id="admin-panel">
            <h3>Monitoramento ADM</h3>
            <div id="logs">Carregando atividades...</div>
            <button class="btn-love" onclick="location.reload()">Sair do Painel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEn2r3a1H05Lq2bwm5D2UNS7OqiqL8Yl4",
            authDomain: "love-me-efa5e.firebaseapp.com",
            projectId: "love-me-efa5e",
            storageBucket: "love-me-efa5e.firebasestorage.app",
            messagingSenderId: "970609314310",
            appId: "1:970609314310:web:7ebdd3da285377e4509187",
            measurementId: "G-7T8V6FCSDE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const player = document.getElementById('meu-player');

        // Cria corações flutuantes neon no fundo
        function createFloatingHearts() {
            const container = document.getElementById('heartContainer');
            const heartIcons = ['❤️', '💖', '✨', '🌸'];
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 7000);
            }, 500);
        }
        createFloatingHearts();

        const textoRosa = "Uma flor para outra flor.🌸 Espero que o seu dia se torne ainda mais feliz. É simples, mas é de coração, era exatamente esse sorriso bobo que eu queria!";
        set(ref(db, 'settings/messages'), textoRosa);

        window.startApp = () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('user-view').style.display = 'block';
            explode();
        };

        window.openAdmin = () => {
            const p = prompt("Acesso ADM:");
            if(p === "uPseHqrA1OYlejZqpzQjtOkKtsq2") {
                document.getElementById('user-view').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                onValue(ref(db, 'interactions'), (s) => {
                    const l = document.getElementById('logs'); l.innerHTML = "";
                    s.forEach(c => { l.innerHTML += `<div><strong>${c.val().t}</strong>: ${c.val().e}</div>`; });
                    l.scrollTop = l.scrollHeight;
                });
            }
        };

        function explode() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ff85a2', '#ffdae3', '#ffffff'] });
        }

        window.showRose = () => {
            onValue(ref(db, 'settings/messages'), (s) => {
                document.getElementById('content').innerHTML = `
                    <div class="rose-anim">🌹</div>
                    <p style="font-family:'Dancing Script'; font-size:1.4rem; padding: 10px; color:#5a5a5a;">${s.val()}</p>
                `;
                log("Abriu a Rosa");
            }, { onlyOnce: true });
        };

        window.showMusic = () => {
            document.getElementById('content').innerHTML = `
                <p>Nossa trilha sonora...</p>
                <button class="btn-love" onclick="tocar('./musicas/froid.mp3', 'Minha favorita')">🎵 Minha favorita</button>
                <button class="btn-love" onclick="tocar('./musicas/xama.mp3', 'Teu signo')">🐃 Teu signo</button>
                <button class="btn-love" onclick="tocar('./musicas/poesia.mp3', 'Fecha os olhos e viaja')">✍️ Fecha os olhos e viaja</button>
            `;
        };

        window.tocar = (caminho, nome) => {
            player.src = caminho;
            player.load();
            player.play().catch(e => console.error("Erro áudio"));
            explode();
            log(`Ouviu: ${nome}`);
        };

        window.showGifts = () => {
            let h = '<p>Toque em uma caixa para descobrir...</p>';
            for(let i=1; i<=5; i++) h += `<div class="gift-box" onclick="gift(${i})">🎁</div>`;
            document.getElementById('content').innerHTML = h;
        };

        window.gift = (i) => {
            const list = [
                {m: "Chocolate! quando vc quiser 🍫", e: "🍫"},
                {m: "1000 Corações! vc merece muitos ❤️", e: "❤️"},
                {m: "1000 Beijos! um montão 💋", e: "💋"},
                {m: "Passeio comigo! onde vc quer ir? 🚗", e: "🚗"},
                {m: "Um desejo seu! posso realizar? ✨", e: "✨"}
            ];
            
            const item = list[i-1];
            document.getElementById('content').innerHTML = `
                <div style="font-size:80px; animation: heartbeat 1s infinite;">${item.e}</div>
                <div class="msg-reveal">${item.m}</div>
                <button class="btn-love" onclick="showGifts()" style="margin-top:15px; font-size:12px;">Abrir outra</button>
            `;
            
            // Explosão temática
            confetti({ particleCount: 40, spread: 50, origin: { y: 0.7 }, shapes: [confetti.shapeFromText({ text: item.e, scalar: 2 })] });
            log(`Ganhou: ${item.m}`);
        };

        function log(e) {
            push(ref(db, 'interactions'), { e, t: new Date().toLocaleTimeString() });
        }
    </script>
</body>
</html>
